[pytest]
# CostGuard v17.0 - Pytest Configuration

# Asyncio mode: auto applies @pytest.mark.asyncio to all async test functions
asyncio_mode = auto

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
cache_dir = .pytest_cache

# Default options for every run
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -p no:warnings
    --basetemp=.pytest_tmp

# Custom markers
markers =
    integration: Requires a live PostgreSQL Docker container (slow, run with --integration)
    unit: Pure Python unit tests with no external dependencies (fast)
    smoke: Critical path tests - run before deployment

# Coverage configuration
[coverage:run]
source = backend
data_file = .coverage
omit =
    backend/pade/trainer.py
    backend/pcam/models.py
    */__init__.py
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if TYPE_CHECKING:
    raise NotImplementedError
